

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="container flex bg_black">

        <!-- LEFT SIDEBAR -->
        <div class="left bg_black">

            <div class="close" id="closeBtn">
                <img class="invert" src="cancel.svg" alt="close">
            </div>

            <div class="p-1 m-1 rounded home bg_grey">
                <div class="logo">
                    <img class="invert" src="logo.svg" alt="Logo">
                    <h2 class="m-1">Spotify</h2>
                </div>

                <ul>
                    <li><img class="invert" src="home.svg" alt="Home"> <a class="link" href="#">Home</a></li>
                    <li><img class="invert" src="srch.svg" alt="Search"> <a class="link" href="#">Search</a></li>
                </ul>
            </div>

            <div class="p-1 m-1 rounded lib bg_grey">
                <div class="heading">
                    <img class="invert" src="library-svgrepo-com.svg" alt="Library">
                    <h2>Your Library</h2>
                </div>

                <div class="songList">
                    <ul></ul>
                </div>

                <div class="footer">
                    <div><a href="https://www.spotify.com/in-en/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/safetyandprivacy/"><span>Safety &amp; Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/"><span>Privacy Policy</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/in-en/accessibility/"><span>Accessibility</span></a></div>
                </div>
            </div>

        </div>

        <!-- RIGHT CONTENT -->
        <div class="rounded right bg_grey">

            <div class="p-1 m-1 header">
                <img class="invert hamburger" id="hamburger" src="hamburger.svg" alt="menu">

                <div class="nav">
                    <svg class="arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" />
                    </svg>
                    <svg class="arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" />
                    </svg>
                </div>

                <div class="button">
                    <button class="signbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>
                </div>
            </div>

            <div class="spotpl">
                <h1>Spotify Playlist</h1>
                <div class="cardcontainer">
                    
                    <!-- <div data-folder="cs" class="rounded card">
                        <div class="icon-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                                fill="none" stroke="#141B34" stroke-width="1.5" stroke-linejoin="round">
                                <path d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42132C6.35159 5.02245 6.8418 4.73288 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.811 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z" fill="#000" />
                            </svg>
                        </div>
                        <img class="rounded" src="image.png" alt="cover">
                        <h2>Gehra Hua</h2>
                        <p>
                            <a class="link" href="#">Shashwat Sachdev</a>,
                            <a class="link" href="#">Arijit Singh</a>,
                            <a class="link" href="#">Irshad Kamil</a>,
                            <a class="link" href="#">Armaan Khan</a>
                        </p>
                    </div> -->
                    
                </div>

                <!-- PLAYBAR -->
                <div class="playbar">
                    <div class="seekbar">
                        <div class="circle_"></div>
                    </div>
                    <div class="abovebar">
                        <div class="songinfo"></div>
                        <div class="songbtn">
                            <img width="35" id="previous" src="prev.svg" alt="previous">
                            <img width="35" id="play" src="play.svg" alt="play">
                            <img width="35" id="next" src="next.svg" alt="next">
                        </div>
                        <div class="timenvol">
                            <div class="songtime"></div>
                            <div class="volume">
                                <img src="volume.svg" alt="volume">
                                <div class="range">
                                    <input type="range" name="volume" id="volumeRange" min="0" max="100" value="70">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay"></div>

    <script src="spot.js"></script>
</body>

</html>
